<mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav mode="side" [opened]="!isEntryPage" style="width: 260px;" *ngIf="!isEntryPage && isLoggedIn">
        
        <ng-container *ngIf="!activeMainLink && !activeTasks">
            <mat-nav-list>
                <mat-nav-list class="!px-0 !mt-10">
                    <a mat-list-item *ngFor="let link of navLinks" (click)="openSubMenu(link)"
                        class="!rounded-none !p-0 !h-auto hover:bg-[#f8af61] block w-full">
                        <div class="flex items-center justify-center w-full py-5">
                            <div class="flex items-center gap-8 w-52">
                                <mat-icon class="custom-icon flex-none text-white !h-8 !w-8 text-3xl">{{ link.icon }}</mat-icon>
                                <span class="text-xl font-medium text-white whitespace-nowrap">{{ link.label }}</span>
                            </div>
                        </div>
                    </a>
                </mat-nav-list>
            </mat-nav-list>
        </ng-container>

        <ng-container *ngIf="activeMainLink">
            <div class="flex justify-between items-center p-4 mb-4">
                <div class="flex items-center gap-3">
                    <img src="assets/07.png" alt="Logo" class="w-9 h-9 rounded-full" />
                    <span class="text-white text-xl font-bold tracking-tight">Menu</span>
                </div>
                <div>
                    <button mat-icon-button (click)="backToMainMenu()" class="text-white/60">
                        <mat-icon>arrow_back</mat-icon>
                    </button>
                </div>
            </div>

            <div class="px-2">
                <mat-nav-list class="!p-0">
                    <ng-container *ngFor="let child of activeMainLink?.children">
                        <ng-container *ngIf="!child.requiresAdmin || authService.isAdmin">
                            <a mat-list-item [routerLink]="child.path" (click)="closeSidenav()" 
                               class="!h-auto !p-0 block">
                                <div class="flex items-center w-full px-4 py-2 hover:bg-white/5 rounded-xl transition-all">
                                    <div class="flex-none w-10 flex items-center">
                                        <mat-icon class="text-white/70 !text-[20px]">{{ child.icon }}</mat-icon>
                                    </div>
                                    <span class="flex-1 text-white/90 text-lg font-medium tracking-wide">
                                        {{ child.label }}
                                    </span>
                                </div>
                            </a>
                        </ng-container>
                    </ng-container>
                </mat-nav-list>
            </div>
        </ng-container>

        <ng-container *ngIf="activeTasks">
            <div class="flex justify-between items-center p-4 mb-4">
                <div class="flex items-center gap-3">
                    <img src="assets/07.png" alt="Logo" class="w-9 h-9 rounded-full" />
                    <span class="text-white text-xl font-bold tracking-tight">Menu</span>
                </div>
                <div>
                    <button mat-icon-button (click)="backToMainMenu()" class="text-white/60">
                        <mat-icon>arrow_back</mat-icon>
                    </button>
                </div>
            </div>
            
            <div class="p-2">
                <span class="block mb-3 px-4 text-white/40 text-[13px] font-semibold uppercase tracking-[0.15em]">Tasks</span>
                <div class="flex flex-col mb-10">
                    <div *ngFor="let task of tasksSummary" class="flex items-center w-full px-4 py-1.5 hover:bg-white/5 rounded-lg transition-all">
                        <div class="flex-none w-10 flex items-center">
                            <mat-icon class="text-white/70 ">{{ task.icon }}</mat-icon>
                        </div>
                        <span class="flex-1 text-white/90 text-lg truncate tracking-wide">{{ task.label }}</span>
                        <div class="flex-none w-6 h-6 flex items-center justify-center bg-white/10 text-white/60 rounded-full text-[11px] font-bold">
                            {{ task.count }}
                        </div>
                    </div>
                </div>

                <span class="block mb-3 px-4 text-white/40 text-[13px] font-semibold uppercase tracking-[0.15em]">Projects</span>
                <mat-list class="!p-0 mb-10">
                    <mat-list-item *ngFor="let project of projects" class="!h-auto !p-0">
                        <div class="flex items-center w-full px-4 py-1.5 hover:bg-white/5 rounded-lg transition-all group">
                            <div class="flex-none w-10 flex items-center">
                                <img src="assets/fish-re.png" alt="Project Icon" class="w-7 h-7 object-contain opacity-80">
                            </div>
                            <span class="flex-1 text-white/90 text-lg truncate tracking-wide">{{ project.title }}</span>
                            <button mat-icon-button color="warn" (click)="deleteProject(project.id)"
                                class="flex-none opacity-0 group-hover:opacity-100 transition-opacity !w-8 !h-8">
                                <mat-icon class="!text-[18px]">delete</mat-icon>
                            </button>
                        </div>
                    </mat-list-item>
                    <mat-list-item class="!h-auto !p-0">
                        <form [formGroup]="projectForm" (ngSubmit)="addProject()" class="flex items-center w-full px-4 py-1">
                            <div class="flex-none w-10 flex items-center">
                                <button mat-icon-button type="submit" class="!w-8 !h-8 !p-0 flex items-center justify-center">
                                    <mat-icon class="text-white !m-0 !text-xl">add</mat-icon>
                                </button>
                            </div>
                            <input placeholder="Add new project" formControlName="project"
                                class="flex-1 bg-transparent border-none text-white outline-none text-lg placeholder:text-white/50">
                        </form>
                    </mat-list-item>
                </mat-list>

                <span class="block mb-3 px-4 text-white/40 text-[13px] font-semibold uppercase tracking-[0.15em]">Contacts</span>
                <mat-list class="!p-0">
                    <mat-list-item *ngFor="let contact of contacts" class="!h-auto !p-0">
                        <div class="flex items-center w-full px-4 py-1.5 hover:bg-white/5 rounded-lg transition-all group">
                            <div class="flex-none w-10 flex items-center">
                                <img src="assets/catBtn.png" alt="Contact Icon" class="w-6 h-6 rounded-full object-cover">
                            </div>
                            <span class="flex-1 text-white/90 text-lg truncate tracking-wide">{{ contact.firstName }} {{ contact.lastName }}</span>
                            <button mat-icon-button color="warn" (click)="deleteContact(contact.id)"
                                class="flex-none opacity-0 group-hover:opacity-100 transition-opacity !w-8 !h-8">
                                <mat-icon class="!text-[18px]">delete</mat-icon>
                            </button>
                        </div>
                    </mat-list-item>
                    <mat-list-item class="!h-auto !p-0">
                        <form [formGroup]="contactForm" (ngSubmit)="addContact()" class="flex items-center w-full px-4 py-1">
                            <div class="flex-none w-10 flex items-center">
                                <button mat-icon-button type="submit" class="!w-8 !h-8 !p-0 flex items-center justify-center">
                                    <mat-icon class="text-white !m-0 !text-xl">add</mat-icon>
                                </button>
                            </div>
                            <input placeholder="Add new contact" formControlName="contact"
                                class="flex-1 bg-transparent border-none text-white outline-none text-lg placeholder:text-white/50">
                        </form>
                    </mat-list-item>
                </mat-list>
            </div>
        </ng-container>

        </mat-sidenav>

    <mat-sidenav-content>
        <!-- 修改處：加入 && isLoggedIn 確保 toolbar 按鈕與 sidenav 同時存在 -->
        <mat-toolbar *ngIf="!isEntryPage && isLoggedIn" class="toolbar">
            <button mat-icon-button (click)="toggleSidenav()">
                <mat-icon>menu</mat-icon>
            </button>
            <span>{{ title }}</span>
        </mat-toolbar>

        <div [class.p-4]="!isEntryPage" [class.h-full]="!isEntryPage" class="flex flex-col">
            <router-outlet></router-outlet>
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
